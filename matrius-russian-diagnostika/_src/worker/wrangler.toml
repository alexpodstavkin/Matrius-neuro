name = "matrius-russian-gc-proxy"
main = "getcourse-proxy.js"
compatibility_date = "2024-09-01"

# Секреты задаются командой:
#   wrangler secret put GC_ACCOUNT
#   wrangler secret put GC_SECRET_KEY
#
# Оффер 8408464 захардкожен в getcourse-proxy.js (не в env),
# чтобы общий GC_OFFER_CODE от соседнего Worker'а его не перебивал.

[vars]
ALLOWED_ORIGIN = "https://web.matrius.online"
